scene_number: 0
part: B
title: "반찬가게 앞에서 멈추다"
duration_sec: 8
visual_description: >
  A traditional Korean market alley. A 65-year-old Korean woman, 168cm tall, slender upright posture radiating
  quiet authority, silver-streaked black hair pulled back neatly into a low chignon, sharp intelligent eyes with
  subtle crow's feet, high cheekbones, thin pressed lips, an air of composed elegance. Wearing a tailored charcoal
  gray wool coat over a cream silk blouse, a thin gold necklace, black leather pumps, carrying a dark brown
  structured leather handbag. She stops abruptly in front of a small banchan shop, her body freezing mid-step.
  Her gaze locks onto something — a small boy sitting on a plastic chair eating from a bowl. Her expression
  shifts from casual nostalgia to stunned recognition, her grip tightening on her handbag strap, knuckles
  whitening. Korean drama cinematography, warm amber tones shifting to cooler, more tense blue-gray undertones
  as the emotional shift hits. Photorealistic, cinematic color grading, natural lighting, 4K, film grain,
  shallow depth of field.
camera_movement: >
  The camera captures her face in a medium close-up as she freezes, then slowly racks focus past her shoulder
  to reveal the blurred silhouette of the boy eating alone in front of the shop.
mood: "충격, 숨이 멈추는 순간"
