part: A
title: "시장 골목을 걷는 정희"
duration_sec: 8
visual_description: >
  A traditional Korean market alley (jeontongsijang), narrow covered passage with corrugated metal roofing,
  small shops packed tightly on both sides displaying banchan (side dishes) in metal trays, vegetables, dried fish.
  Fluorescent tube lights overhead, weathered signboards in Korean, plastic crates and boxes stacked outside shops.
  Weekday afternoon, sparsely populated. A 65-year-old Korean woman, 168cm tall, slender upright posture radiating
  quiet authority, silver-streaked black hair pulled back neatly into a low chignon, sharp intelligent eyes with
  subtle crow's feet, high cheekbones, thin pressed lips, an air of composed elegance. Wearing a tailored charcoal
  gray wool coat over a cream silk blouse, a thin gold necklace, black leather pumps, carrying a dark brown
  structured leather handbag. She walks slowly through the market alley, her elegant appearance contrasting
  starkly with the humble surroundings. She breathes in the market smells with a faint nostalgic expression,
  glancing at the stalls as she passes. Korean drama cinematography, warm amber afternoon light filtering through
  the market roof gaps, mixing with cool fluorescent overhead light. Photorealistic, cinematic color grading,
  natural lighting, 4K, film grain, shallow depth of field.
camera_movement: >
  The camera follows her from behind in a slow tracking shot, then circles to reveal her face in profile
  as she walks deeper into the alley.
mood: "향수, 고요한 긴장감의 시작"
